version: '3'
services:
  mapgen-frontend:
    build:
      context: .
      dockerfile: ./container/frontend/Dockerfile
    image: ghcr.io/xcsoar/mapgen-frontend
    ports:
      - "9091:9090"
    volumes:
      - mapgen-jobs:/opt/mapgen/jobs
  mapgen-worker:
    build:
      context: .
      dockerfile: ./container/worker/Dockerfile
    image: ghcr.io/xcsoar/mapgen-worker
    environment:
      - MAPGEN_DATA_URL=${MAPGEN_DATA_URL:-https://mapgen-data.sigkill.ch/}
      - MAPGEN_DEM_DATASET=${MAPGEN_DEM_DATASET:-}
      - MAPGEN_DEM_EXTENSIONS=${MAPGEN_DEM_EXTENSIONS:-}
      - MAPGEN_HIGH_QUALITY_DATA_URL=${MAPGEN_HIGH_QUALITY_DATA_URL:-file:///opt/mapgen/high-quality-data/}
      - MAPGEN_HIGH_QUALITY_DEM_DATASET=${MAPGEN_HIGH_QUALITY_DEM_DATASET:-dem1}
      - MAPGEN_HIGH_QUALITY_DEM_EXTENSIONS=${MAPGEN_HIGH_QUALITY_DEM_EXTENSIONS:-tif}
      - MAPGEN_ESTIMATED_POWER_WATTS=${MAPGEN_ESTIMATED_POWER_WATTS:-25}
    volumes:
      - mapgen-jobs:/opt/mapgen/jobs
      - mapgen-data:/opt/mapgen/data
      - ${MAPGEN_HIGH_QUALITY_DATA_DIR:-/home/slawek/mapgen-data-nowa_mapa2/repo}:/opt/mapgen/high-quality-data:ro

  kigo-task-map:
    build:
      context: .
      dockerfile: ./container/taskmap/Dockerfile
    image: kigo-task-map
    ports:
      - "${KIGO_TASK_MAP_PORT:-8080}:8080"
    volumes:
      - ${KIGO_TASK_MAP_BASE_MAP_DIR:-/maps}:/maps:ro
      - kigo-task-map-runways:/tmp/kigo_task_map_runways
      - kigo-task-map-xcm-cache:/tmp/kigo_task_map_xcm_cache
      - ${MAPGEN_HIGH_QUALITY_DATA_DIR:-/home/slawek/mapgen-data-nowa_mapa2/repo}:/opt/mapgen/high-quality-data:ro
    environment:
      - KIGO_MAPGEN_URL=${KIGO_MAPGEN_URL:-http://172.17.0.1:9091}
      - KIGO_TASK_MAP_BASE_XCM=${KIGO_TASK_MAP_BASE_XCM:-}
      - KIGO_TASK_MAP_RUNWAY_CACHE_DIR=/tmp/kigo_task_map_runways
      - KIGO_TASK_MAP_XCM_CACHE_DIR=/tmp/kigo_task_map_xcm_cache
      - KIGO_TASK_MAP_SOURCE_REPO=/opt/mapgen/high-quality-data
      - KIGO_TASK_MAP_ROUTE_TILE_MARGIN_KM=${KIGO_TASK_MAP_ROUTE_TILE_MARGIN_KM:-20}
      - KIGO_TASK_MAP_TILE_CACHE_MAX_TILES=${KIGO_TASK_MAP_TILE_CACHE_MAX_TILES:-3}

volumes:
  mapgen-data:
  mapgen-jobs:
  kigo-task-map-runways:
  kigo-task-map-xcm-cache:
